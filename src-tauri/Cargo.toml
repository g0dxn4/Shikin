[package]
name = "valute"
version = "0.1.0"
description = "AI-first, local-first personal finance manager"
authors = ["ASF"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "valute_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2" }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
tauri = { version = "2" }
tauri-plugin-log = "2"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
tauri-plugin-store = "2"
